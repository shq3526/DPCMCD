services:
  app:
    image: msp-master-project
    # (核心修正) command 现在只指定要运行的脚本
    # 换行符问题将在运行时通过挂载整个目录来解决
    command: ["python", "fewshot-config.py"]
    # 将本地的整个项目文件夹挂载到容器的 /workspace 目录
    volumes:
      - .:/workspace
    # 配置 GPU 访问
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 保持标准输入输出流开启
    stdin_open: true
    tty: true